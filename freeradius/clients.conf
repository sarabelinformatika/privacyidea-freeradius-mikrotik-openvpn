###############################################################################
#
# FreeRADIUS Client Configuration
#
# PrivacyIDEA + MikroTik OpenVPN
#
# SARABEL Informatika Kft.
# https://sarabelinformatika.hu
#
###############################################################################

#
# Localhost (used for local testing)
#

client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
}

client localhost_ipv6 {
    ipv6addr = ::1
    secret = testing123
}

#
# MikroTik RouterOS
#

client mikrotik {

    #
    # Replace with the IP address of your MikroTik router.
    #

    ipaddr = 192.168.110.1

    #
    # Replace with a strong random shared secret.
    #

    secret = CHANGE_ME_TO_A_STRONG_RADIUS_SECRET

    #
    # Optional short description
    #

    shortname = mikrotik-router

    #
    # NAS Type
    #

    nas_type = other
}
